<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Welcome cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#e5e5e5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d4d4d4" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI" fill="#0a0a0a">
    <text x="72" y="500" font-size="92" font-weight="600" letter-spacing="-2">Welcome.</text>
    <text x="76" y="548" font-size="22" fill="#737373">jonathan romano · notes</text>
  </g>
